<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Name prompt overlay shown until the user joins -->
  <div id="join-overlay" class="overlay">
    <form id="join-form" class="join-card">
      <h1>Chat</h1>
      <p class="subtitle">Pick a name to start chatting.</p>
      <div class="name-row">
        <input
          id="name-input"
          type="text"
          placeholder="Your name"
          maxlength="32"
          autocomplete="off"
          required
        />
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle theme">
          <img id="theme-icon" class="theme-icon" src="img/dark-mode.png" alt="" />
        </button>
      </div>
      <button type="submit">Join</button>
    </form>
  </div>

  <div class="app">
    <header class="app-header">
      <div class="header-left">
        <span class="title">Chat</span>
        <span id="presence" class="presence" aria-live="polite"></span>
      </div>
    </header>

    <main id="messages" class="messages" aria-live="polite"></main>

    <form id="chat-form" class="composer">
      <!-- Staged attachment preview (shown before sending) -->
      <div id="attach-preview" class="attach-preview hidden">
        <div class="attach-preview-media"></div>
        <button id="attach-remove" class="attach-remove" type="button" aria-label="Remove attachment" title="Remove">✕</button>
      </div>

      <button
        id="tools-btn"
        class="icon-btn"
        type="button"
        aria-label="Open tools"
        aria-expanded="false"
        title="Tools"
        disabled
      >
        <span class="hamburger" aria-hidden="true"></span>
      </button>
      <input
        id="message-input"
        type="text"
        placeholder="Type a message…"
        maxlength="2000"
        autocomplete="off"
        disabled
      />
      <button id="send-btn" type="submit" disabled>Send</button>

      <!-- Hidden file picker, triggered from the Attach menu item -->
      <input id="file-input" type="file" accept="image/*,video/*" hidden />

      <!-- Tools panel: opens above the composer -->
      <div id="tools-panel" class="tools-panel hidden" role="dialog" aria-label="Tools">
        <!-- Menu view: list of tools -->
        <div id="tools-menu" class="tools-view">
          <button id="open-emojis-btn" class="tools-item" type="button">Emojis</button>
          <button id="attach-btn" class="tools-item" type="button">Attach</button>
        </div>

        <!-- Emoji view: shown after clicking "Emojis" -->
        <div id="tools-emojis" class="tools-view hidden">
          <div class="tools-header">
            <button id="emoji-back-btn" class="tools-back" type="button" aria-label="Back">‹ Back</button>
            <span class="tools-header-title">Emojis</span>
          </div>
          <div id="emoji-grid" class="emoji-grid"></div>
        </div>
      </div>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
